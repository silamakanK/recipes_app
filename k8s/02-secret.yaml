apiVersion: v1
kind: Secret
metadata:
  name: nutrismart-secret
  namespace: nutrismart
type: Opaque
# Les valeurs doivent être encodées en base64 :
#   echo -n "valeur" | base64
# Pour appliquer les vraies valeurs, remplacez les placeholders ci-dessous
# ou utilisez : kubectl create secret generic nutrismart-secret \
#   --from-env-file=.env.local -n nutrismart
stringData:
  SUPABASE_URL: "REPLACE_WITH_YOUR_SUPABASE_URL"
  SUPABASE_KEY: "REPLACE_WITH_YOUR_SUPABASE_ANON_KEY"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_WITH_YOUR_SUPABASE_SERVICE_ROLE_KEY"
  OPENAI_KEY: "REPLACE_WITH_YOUR_OPENAI_KEY"
  POSTGRES_PASSWORD: "nutrismart_secure_password"
