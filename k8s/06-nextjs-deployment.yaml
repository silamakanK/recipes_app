apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutrismart-nextjs
  namespace: nutrismart
  labels:
    app: nutrismart-nextjs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nutrismart-nextjs
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nutrismart-nextjs
    spec:
      containers:
        - name: nextjs
          image: nutrismart-app:latest
          # Pour kind : image doit être chargée avec `kind load docker-image`
          # Pour k3s : image doit être dans un registry accessible
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nutrismart-config
            - secretRef:
                name: nutrismart-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
